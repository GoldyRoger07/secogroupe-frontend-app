<div class="h-screen w-full flex items-center justify-center bg-gray-100">
    <div class="max-w-md w-full flex flex-col gap-3 shadow bg-white p-10">
        <div class="flex items-center gap-3">
            <img src="img/logo/logo1.png" class="w-10" alt="logo">
            <h1 class="text-gray-500 font-semibold text-2xl">Secogroupe</h1>
        </div>
        <h2 class="text-gray-500  text-lg ">{{'SIGNIN.TITLE' | translate}}</h2>
        <form class="flex flex-col gap-3">

            <p-floatlabel variant="on">
                    <input pInputText id="on_label" autocomplete="off" fluid />
                    <label for="on_label">{{'SIGNIN.USERNAME' | translate}}</label>
            </p-floatlabel>

            <p-floatlabel variant="on">
                    <input pInputText id="password" autocomplete="off" fluid  type="password"/>
                    <label for="password">{{'SIGNIN.PASSWORD' | translate}}</label>
            </p-floatlabel>

            <p class="text-gray-500 text-sm">{{'SIGNIN.NO_ACCOUNT' | translate}} <a href="#" class="text-blue-500 hover:underline">{{'SIGNIN.CREATE_LINK' | translate}}</a></p>
            <a href="#" class="text-blue-500 text-sm hover:underline">{{'SIGNIN.FORGOT_PASSWORD' | translate}}</a>

            <p-button label="Submit" class="ml-auto"/>
        </form>
    </div>
</div>

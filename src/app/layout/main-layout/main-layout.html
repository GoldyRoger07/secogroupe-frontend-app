<div class="app-shell" [class.collapsed]="collapsed()">
  <aside class="sidebar">
    <div class="sidebar-header border-b border-gray-200">
      <div class="brand">
        <!-- <i class="pi pi-building"></i> -->
         <img src="img/logo/logo4.webp" class="w-24" alt="logo">
        <span class="brand-name">SecoGroupe</span>
      </div>
      <button class="toggle-btn" (click)="toggle()" [title]="collapsed() ? 'Développer' : 'Réduire'">
        <i class="pi" [class.pi-chevron-left]="!collapsed()" [class.pi-chevron-right]="collapsed()"></i>
      </button>
    </div>

    <nav class="nav">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
          [title]="collapsed() ? item.label : ''"
        >
          <i [class]="item.icon + ' nav-icon'"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">{{ currentUser.user().initial }}</div>
        <div class="user-meta">
          <span class="user-name">{{ currentUser.user().username }}</span>
          <span class="user-role">Connecté</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" [title]="collapsed() ? 'Déconnexion' : ''">
        <i class="pi pi-sign-out nav-icon"></i>
        <span class="nav-label">Déconnexion</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <router-outlet />
  </main>
</div>

<p-toast position="top-right" />
<p-confirmDialog />
